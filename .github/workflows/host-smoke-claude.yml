name: Host Smoke - Claude Code

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

concurrency:
  group: host-smoke-claude-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  claude-smoke:
    name: Claude Code smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Prepare diagnostics
        run: mkdir -p host-smoke-artifacts/claude

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.3 --activate

      - name: Print runtime versions
        run: |
          node --version
          npm --version
          pnpm --version

      - uses: ./.github/actions/setup-skills-ref

      - name: Validate repository
        run: |
          pnpm run test
          pnpm run validate
          pnpm run validate:publish
          pnpm run validate:skills-ref

      - name: Install Claude Code CLI on GitHub runner
        working-directory: ${{ runner.temp }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm install -g @anthropic-ai/claude-code; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 10
          done

      - name: Run Claude Code host smoke
        run: node scripts/host-smoke.mjs --host claude --strict-missing --artifacts-dir host-smoke-artifacts/claude

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: host-smoke-claude
          path: host-smoke-artifacts/claude
          if-no-files-found: ignore
          retention-days: 7
