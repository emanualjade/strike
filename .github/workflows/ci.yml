name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.3 --activate

      - uses: ./.github/actions/setup-skills-ref

      - run: pnpm run test
      - run: pnpm run validate
      - run: pnpm run validate:publish
      - run: pnpm run validate:skills-ref
      - run: git diff --check
