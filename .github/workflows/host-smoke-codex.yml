name: Host Smoke - Codex

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

concurrency:
  group: host-smoke-codex-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  codex-smoke:
    name: Codex smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Prepare diagnostics
        run: mkdir -p host-smoke-artifacts/codex

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Print runtime versions
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate repository
        run: |
          pnpm run test
          pnpm run validate
          pnpm run validate:publish

      - name: Install Codex CLI on GitHub runner
        working-directory: ${{ runner.temp }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm install -g @openai/codex; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 10
          done

      - name: Run Codex host smoke
        run: >
          node scripts/host-smoke.mjs
          --host codex
          --strict-missing
          --artifacts-dir host-smoke-artifacts/codex
          --codex-source "$GITHUB_REPOSITORY"
          --codex-ref "$GITHUB_SHA"
          --codex-sparse .agents/plugins
          --codex-sparse plugins/strike

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: host-smoke-codex
          path: host-smoke-artifacts/codex
          if-no-files-found: ignore
          retention-days: 7
