name: Host Smoke - GitHub Copilot CLI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare diagnostics
        run: mkdir -p host-smoke-artifacts/copilot

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.3 --activate

      - name: Print runtime versions
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Validate repository
        run: |
          pnpm run test
          pnpm run validate
          pnpm run validate:publish

      - name: Install GitHub Copilot CLI on GitHub runner
        working-directory: ${{ runner.temp }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm install -g @github/copilot; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 10
          done

      - name: Run GitHub Copilot CLI host smoke
        run: node scripts/host-smoke.mjs --host copilot --strict-missing --artifacts-dir host-smoke-artifacts/copilot

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: host-smoke-copilot
          path: host-smoke-artifacts/copilot
          if-no-files-found: ignore
          retention-days: 7
